services:

  # ── PHP front controller — serves Twig templates at :8301 ─────────────────
  pwa:
    image: php:8.2-alpine
    working_dir: /app
    volumes:
      - .:/app
      - pwa_vendor:/app/vendor   # cache Composer deps across restarts
    ports:
      - "8301:8301"
    # Download Composer on first run if vendor/ is absent, then start PHP server
    command: >
      sh -c "
        [ -f /app/vendor/autoload.php ] || (
          echo '[pwa] Installing Composer dependencies...' &&
          wget -qO /tmp/composer.phar https://getcomposer.org/download/latest-stable/composer.phar &&
          php /tmp/composer.phar install --no-dev --no-interaction --prefer-dist --working-dir=/app
        ) &&
        echo '[pwa] PHP server ready at http://localhost:8301' &&
        php -S 0.0.0.0:8301 -t /app/public
      "

  # ── Vite dev server — HMR at :5173, proxies HTML to pwa:8301 ──────────────
  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_PHP_HOST=pwa      # tells Vite proxy to forward to the pwa container
    depends_on:
      - pwa

  # ── phpMyAdmin (optional, for DB inspection) ──────────────────────────────
  mysql:
    image: mariadb:11.8
    restart: unless-stopped
    ports:
      - "8321:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      start_period: 45s
      interval: 30s
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    ports:
      - "8311:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  db_data: {}
  pwa_vendor: {}
